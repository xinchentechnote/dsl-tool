name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: TypeScript build
        run: yarn watch:tsc --noEmit false

      - name: esbuild
        run: yarn build || yarn watch:esbuild

      - name: Run tests
        run: yarn test
        
      - name: Package extension
        run: yarn vsce package
